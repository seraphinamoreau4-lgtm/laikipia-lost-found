services:
  - type: web
    name: laikipia-lost-found-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://laikipia-lost-found.vercel.app
      - key: PORT
        value: "5000"
databases:
  - name: laikipia-db
    engine: postgres
    version: 15
    plan: free
    databaseName: laikipia_lost_found
    user: postgres
