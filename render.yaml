services:
  - type: web
    name: laikipia-lost-found-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: laikipia-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://your-vercel-url.vercel.app
databases:
  - name: laikipia-db
    engine: postgres
    version: latest
    plan: free
    initializer:
      restoreFrom: null
